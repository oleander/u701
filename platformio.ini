[env:esp32dev]
lib_deps = h2zero/NimBLE-Arduino, mathertel/OneButton, https://github.com/oleander/ESP32-BLE-Keyboard.git, thijse/Arduino-Log
platform = espressif32
monitor_speed = 9200
framework = arduino
; board = esp32doit-devkit-v1
board = featheresp32
upload_speed = 921600
