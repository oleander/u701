; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
lib_deps = h2zero/NimBLE-Arduino, mathertel/OneButton, https://github.com/oleander/ESP32-BLE-Keyboard.git, thijse/ArduinoLog
platform = espressif32
monitor_speed = 9200
framework = arduino
board = esp32dev
upload_speed = 921600
build_flags = -std=gnu++17
build_type = debug
upload_protocol = esptool
build_unflags = -std=c++17
check_tool = cppcheck
check_flags = --enable=all --inconclusive --std=c++17 --suppress=preprocessorErrorDirective

; build_flags = -D RELEASE

