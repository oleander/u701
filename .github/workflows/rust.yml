name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # Weekly security audit

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${{ runner.temp }}/cargo
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install --locked cargo-audit cargo-deny
      - uses: Swatinem/rust-cache@v2
        with:
          key: security-audit-nightly
      - run: cargo audit
      - run: cargo deny check

  format-and-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: format-lint-nightly
      - run: just fmt-check
      - run: just lint

  host-nightly:
    name: Host CI (nightly)
    runs-on: ubuntu-latest
    needs: format-and-lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: host-nightly
      - run: cargo install --locked just
      - run: just test

  embedded:
    name: Embedded Build (nightly)
    runs-on: ubuntu-latest
    needs: host-nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: embedded-nightly
      - run: cargo install --locked just cargo-pio espup
      - run: just setup build
      - uses: actions/upload-artifact@v4
        with:
          name: u701-firmware
          path: target/esp32c3-unknown-none/release/u701.bin
          retention-days: 30