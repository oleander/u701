  embedded:
    name: Embedded Build (nightly)
    runs-on: ubuntu-latest
    needs: host-nightly
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set up CARGO_HOME
        run: echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          key: embedded-nightly

      - name: Install build tools
        run: cargo install --locked just cargo-pio espup   # installs espup, Justfile helper & cargo-pio  [oai_citation:0‡GitHub](https://github.com/esp-rs/espup?utm_source=chatgpt.com)

      - name: Install ESP toolchain
        run: espup install --targets esp32c3             # pulls in Rust std, LLVM & GCC for esp32-c3  [oai_citation:1‡GitHub](https://github.com/esp-rs/espup?utm_source=chatgpt.com)

      - name: Build firmware
        run: |
          . $HOME/export-esp.sh                           # source espup’s generated env file
          just setup build

      - uses: actions/upload-artifact@v4
        with:
          name: u701-firmware
          path: target/esp32c3-unknown-none/release/u701.bin
          retention-days: 30